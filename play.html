<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Firewolf</title>
  <link rel="icon" href="data:," />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #e4e4e7;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    canvas#firewolf-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }
    canvas#firewolf-canvas.locked {
      cursor: none;
    }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      pointer-events: auto;
      transition: opacity 0.3s;
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #overlay h1 {
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #f59e0b;
      margin-bottom: 12px;
    }
    #overlay p {
      font-size: 13px;
      color: #a1a1aa;
      line-height: 1.6;
      text-align: center;
      max-width: 400px;
    }
    #overlay .click-prompt {
      margin-top: 24px;
      font-size: 16px;
      color: #fafafa;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    #overlay pre {
      font-size: 11px;
      color: #fca5a5;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 4px;
      padding: 12px;
      margin-top: 12px;
      overflow: auto;
      max-height: 200px;
      max-width: 560px;
    }
    #build-info {
      position: fixed;
      bottom: 8px;
      left: 12px;
      font-size: 10px;
      color: #52525b;
      z-index: 50;
    }
  </style>
</head>
<body>
  <canvas id="firewolf-canvas" tabindex="0"></canvas>

  <div id="overlay">
    <h1 id="overlay-title">Loading</h1>
    <p id="overlay-msg">Fetching ~44 MB wasm bundle. First load is slow; subsequent visits are cached.</p>
  </div>

  <div id="build-info"></div>

  <script type="module">
    const canvas = document.getElementById('firewolf-canvas');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg = document.getElementById('overlay-msg');
    const buildInfoEl = document.getElementById('build-info');

    // ── Resize canvas to fill viewport ──────────────────────────────────────
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Pointer lock management ─────────────────────────────────────────────
    let gameReady = false;
    let pointerLocked = false;

    function requestLock() {
      if (!pointerLocked && gameReady) {
        canvas.requestPointerLock().catch(() => {});
      }
    }

    document.addEventListener('pointerlockchange', () => {
      pointerLocked = (document.pointerLockElement === canvas);
      if (pointerLocked) {
        canvas.classList.add('locked');
        overlay.classList.add('hidden');
      } else {
        canvas.classList.remove('locked');
        // Show a "click to resume" prompt when pointer lock is lost
        overlayTitle.textContent = 'Paused';
        overlayMsg.innerHTML = '<span class="click-prompt">Click to resume</span>';
        overlay.classList.remove('hidden');
      }
    });

    // Click anywhere to (re-)acquire pointer lock
    canvas.addEventListener('click', requestLock);
    overlay.addEventListener('click', () => {
      overlay.classList.add('hidden');
      // Small delay to let overlay hide before requesting lock
      setTimeout(requestLock, 50);
    });

    // ── Build info ──────────────────────────────────────────────────────────
    void fetch('./build-info.txt', { cache: 'no-cache' })
      .then(r => r.ok ? r.text() : null)
      .then(t => {
        if (!t) return;
        const map = Object.fromEntries(
          t.trim().split('\n').map(l => {
            const i = l.indexOf('=');
            return i < 0 ? [l, ''] : [l.slice(0, i), l.slice(i + 1)];
          })
        );
        if (map.commit) {
          buildInfoEl.textContent =
            `Bevy 0.14 · ${map.commit.slice(0, 8)} · built ${map.built_at ?? '?'}`;
        }
      })
      .catch(() => {});

    // ── Winit control-flow exception suppression ────────────────────────────
    function isWinitControlFlow(err) {
      const s = String(err && (err.message || err));
      return s.includes('Using exceptions for control flow');
    }

    // ── Boot wasm ───────────────────────────────────────────────────────────
    try {
      overlayTitle.textContent = 'Loading';
      overlayMsg.textContent = 'Fetching ~44 MB wasm bundle…';

      const mod = await import('./firewolf_client.js');

      overlayTitle.textContent = 'Initializing';
      overlayMsg.textContent = 'Mounting renderer on canvas…';

      const initPromise = mod.default('./firewolf_client_bg.wasm');

      // Give Bevy time to mount, then show "click to play"
      setTimeout(() => {
        gameReady = true;
        overlayTitle.textContent = 'Ready';
        overlayMsg.innerHTML = '<span class="click-prompt">Click to play</span><br><br><small style="color:#71717a">WASD to move · Mouse to look · Space to jump · Escape to pause</small>';
      }, 500);

      await initPromise;
      gameReady = true;
    } catch (err) {
      if (isWinitControlFlow(err)) {
        gameReady = true;
        overlayTitle.textContent = 'Ready';
        overlayMsg.innerHTML = '<span class="click-prompt">Click to play</span><br><br><small style="color:#71717a">WASD to move · Mouse to look · Space to jump · Escape to pause</small>';
      } else {
        console.error(err);
        overlayTitle.textContent = 'Error';
        overlayMsg.textContent = 'Could not start the game.';
        const pre = document.createElement('pre');
        pre.textContent = err && err.stack ? err.stack : String(err);
        overlay.appendChild(pre);
      }
    }

    // Suppress unhandledrejection for winit control flow
    window.addEventListener('unhandledrejection', (e) => {
      if (isWinitControlFlow(e.reason)) e.preventDefault();
    });

    // Focus canvas immediately so Bevy receives keyboard events
    canvas.focus();
  </script>
</body>
</html>
