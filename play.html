<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Firewolf</title>
  <link rel="icon" href="data:," />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #e4e4e7;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    #canvas-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
    canvas#firewolf-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    canvas#firewolf-canvas.locked {
      cursor: none;
    }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      pointer-events: auto;
      transition: opacity 0.3s;
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #overlay h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #fafafa;
    }
    #overlay p {
      font-size: 1rem;
      color: #a1a1aa;
      max-width: 500px;
      text-align: center;
      line-height: 1.5;
    }
    .click-prompt {
      font-size: 1.2rem;
      color: #fbbf24;
      cursor: pointer;
    }
    #load-progress-container {
      margin-top: 1.5rem;
      width: 320px;
    }
    #load-progress-label {
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      color: #71717a;
      font-family: monospace;
    }
    #load-progress-bar-bg {
      width: 100%;
      height: 6px;
      background: #27272a;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid #3f3f46;
    }
    #load-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f59e0b, #ef4444);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    #error-details {
      margin-top: 1rem;
      max-width: 600px;
      max-height: 200px;
      overflow: auto;
      font-family: monospace;
      font-size: 0.75rem;
      color: #ef4444;
      background: #18181b;
      padding: 0.75rem;
      border-radius: 4px;
      border: 1px solid #3f3f46;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }

    #build-info {
      position: fixed;
      bottom: 16px;
      left: 16px;
      font-size: 18px;
      font-weight: bold;
      color: #e4e4e7;
      text-shadow: 0 0 4px #000, 0 0 8px #000;
      z-index: 50;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="canvas-wrapper">
    <canvas id="firewolf-canvas" tabindex="0"></canvas>
  </div>

  <div id="overlay">
    <h1 id="overlay-title">Checking GPU...</h1>
    <p id="overlay-msg">Verifying WebGPU support in your browser.</p>
    <div id="load-progress-container" style="display:none">
      <div id="load-progress-label">Loading weapons...</div>
      <div id="load-progress-bar-bg">
        <div id="load-progress-bar"></div>
      </div>
    </div>
    <div id="error-details"></div>
  </div>

  <div id="build-info"></div>

  <script type="module">
    const canvas = document.getElementById('firewolf-canvas');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg = document.getElementById('overlay-msg');
    const buildInfoEl = document.getElementById('build-info');
    const progressContainer = document.getElementById('load-progress-container');
    const progressLabel = document.getElementById('load-progress-label');
    const progressBar = document.getElementById('load-progress-bar');
    const errorDetails = document.getElementById('error-details');

    function showError(title, msg, details) {
      overlayTitle.textContent = title;
      overlayMsg.innerHTML = msg;
      progressContainer.style.display = 'none';
      if (details) {
        errorDetails.textContent = details;
        errorDetails.style.display = 'block';
      }
    }

    // ── WebGPU Pre-flight Check ─────────────────────────────────────────────
    async function checkWebGPU() {
      if (!navigator.gpu) {
        showError(
          'WebGPU Not Available',
          'Your browser does not support WebGPU.<br><br>' +
          '<small style="color:#a1a1aa">Please use <b>Chrome 113+</b> or <b>Edge 113+</b>.<br>' +
          'On Mac: Chrome is recommended. Safari 18+ also works.<br><br>' +
          'If you are on Chrome, try visiting <code>chrome://flags/#enable-unsafe-webgpu</code> and enabling it.</small>'
        );
        return false;
      }

      try {
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) {
          showError(
            'No GPU Adapter Found',
            'WebGPU is supported but no GPU adapter is available.<br><br>' +
            '<small style="color:#a1a1aa">This can happen if:<br>' +
            '- Your GPU drivers are outdated<br>' +
            '- Hardware acceleration is disabled in Chrome settings<br>' +
            '- You are in a virtual machine without GPU passthrough<br><br>' +
            'Try: Chrome Settings → System → "Use hardware acceleration when available" → ON<br>' +
            'Then restart Chrome.</small>'
          );
          return false;
        }
        // Adapter found — WebGPU is ready
        return true;
      } catch (e) {
        showError(
          'WebGPU Error',
          'Failed to request GPU adapter.',
          e.message || String(e)
        );
        return false;
      }
    }

    // ── Resize canvas to fill viewport ──────────────────────────────────────
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Pointer lock management ─────────────────────────────────────────────
    let gameReady = false;
    let pointerLocked = false;

    function requestLock() {
      if (!pointerLocked && gameReady) {
        canvas.requestPointerLock().catch(() => {});
      }
    }

    document.addEventListener('pointerlockchange', () => {
      pointerLocked = (document.pointerLockElement === canvas);
      if (pointerLocked) {
        canvas.classList.add('locked');
        overlay.classList.add('hidden');
      } else {
        canvas.classList.remove('locked');
        // Show a "click to resume" prompt when pointer lock is lost
        overlayTitle.textContent = 'Paused';
        overlayMsg.innerHTML = '<span class="click-prompt">Click to resume</span>';
        progressContainer.style.display = 'none';
        errorDetails.style.display = 'none';
        overlay.classList.remove('hidden');
      }
    });

    // Click anywhere to (re-)acquire pointer lock
    canvas.addEventListener('click', requestLock);
    overlay.addEventListener('click', () => {
      // Block clicks until assets are loaded and game is ready
      if (!gameReady) return;
      overlay.classList.add('hidden');
      // Small delay to let overlay hide before requesting lock
      setTimeout(requestLock, 50);
    });

    // ── Build info ──────────────────────────────────────────────────────────
    void fetch('./build-info.txt', { cache: 'no-cache' })
      .then(r => r.ok ? r.text() : null)
      .then(t => {
        if (!t) return;
        const map = Object.fromEntries(
          t.trim().split('\n').map(l => {
            const i = l.indexOf('=');
            return i < 0 ? [l, ''] : [l.slice(0, i), l.slice(i + 1)];
          })
        );
        if (map.commit) {
          buildInfoEl.textContent =
            `Bevy 0.14 [WebGPU] · ${map.commit.slice(0, 8)} · built ${map.built_at ?? '?'}`;
        }
      })
      .catch(() => {});

    // ── Asset preload progress polling ──────────────────────────────────────
    let assetsReady = false;
    let progressPollInterval = null;

    function startProgressPolling() {
      progressContainer.style.display = 'block';
      overlayTitle.textContent = 'Loading Assets';
      overlayMsg.textContent = 'Downloading weapon models (~109 MB). Cached after first load.';

      progressPollInterval = setInterval(() => {
        const el = document.getElementById('fw-load-progress');
        if (!el) return;

        const text = el.textContent || '';
        const parts = text.split('/');
        if (parts.length === 2) {
          const loaded = parseInt(parts[0], 10);
          const total = parseInt(parts[1], 10);
          if (!isNaN(loaded) && !isNaN(total) && total > 0) {
            const pct = Math.round((loaded / total) * 100);
            progressBar.style.width = pct + '%';
            progressLabel.textContent = `Loading weapons: ${loaded}/${total} (${pct}%)`;

            if (loaded >= total && !assetsReady) {
              assetsReady = true;
              clearInterval(progressPollInterval);
              // All assets loaded — show "Click to play"
              showReady();
            }
          }
        }
      }, 200);

      // Fallback: if after 90s assets haven't reported done, show ready anyway
      // (increased from 60s to account for slow connections)
      setTimeout(() => {
        if (!assetsReady) {
          assetsReady = true;
          clearInterval(progressPollInterval);
          showReady();
        }
      }, 90000);
    }

    function showReady() {
      gameReady = true;
      errorDetails.style.display = 'none';
      overlayTitle.textContent = 'Ready';
      overlayMsg.innerHTML = '<span class="click-prompt">Click to play</span><br><br><small style="color:#71717a">WASD move · Mouse look · Space jump · Q cycle weapon · 1-8 select weapon · RMB scope · Esc pause</small>';
      progressContainer.style.display = 'none';
    }

    // ── Capture Rust panics from console ────────────────────────────────────
    // Bevy uses console_error_panic_hook which logs panics to console.error.
    // We intercept these and show them in the overlay.
    const originalConsoleError = console.error;
    let panicCaptured = false;
    console.error = function(...args) {
      originalConsoleError.apply(console, args);
      if (panicCaptured) return;
      const msg = args.map(a => typeof a === 'string' ? a : JSON.stringify(a)).join(' ');
      if (msg.includes('panicked at') || msg.includes('wasm `unreachable`') || msg.includes('RuntimeError')) {
        panicCaptured = true;
        showError(
          'Engine Crash',
          'The game engine encountered a fatal error during initialization.',
          msg.slice(0, 1000)
        );
      }
    };

    // ── Winit control-flow exception suppression ────────────────────────────
    function isWinitControlFlow(err) {
      const s = String(err && (err.message || err));
      return s.includes('Using exceptions for control flow');
    }

    // ── Boot sequence ───────────────────────────────────────────────────────
    async function boot() {
      // Step 1: Check WebGPU availability
      const gpuOk = await checkWebGPU();
      if (!gpuOk) return;

      // Step 2: Load WASM module
      try {
        overlayTitle.textContent = 'Loading';
        overlayMsg.textContent = 'Fetching ~44 MB wasm bundle...';

        const cb = Date.now();
        const mod = await import(`./firewolf_client.js?v=${cb}`);

        overlayTitle.textContent = 'Initializing';
        overlayMsg.textContent = 'Mounting WebGPU renderer...';

        const initPromise = mod.default(`./firewolf_client_bg.wasm?v=${cb}`);

        // Give Bevy time to mount and start preloading, then begin polling
        setTimeout(() => {
          if (!panicCaptured) {
            startProgressPolling();
          }
        }, 2000);

        await initPromise;
        // If initPromise resolves normally (unlikely with winit), mark ready
        if (!assetsReady && !panicCaptured) {
          setTimeout(() => {
            if (!assetsReady && !panicCaptured) {
              assetsReady = true;
              clearInterval(progressPollInterval);
              showReady();
            }
          }, 2000);
        }
      } catch (err) {
        if (isWinitControlFlow(err)) {
          // Bevy is running — start polling for asset progress
          if (!progressPollInterval && !panicCaptured) {
            startProgressPolling();
          }
        } else {
          console.error(err);
          if (!panicCaptured) {
            showError(
              'Error',
              'Could not start the game engine.',
              err && err.stack ? err.stack : String(err)
            );
          }
        }
      }
    }

    // Suppress unhandledrejection for winit control flow
    window.addEventListener('unhandledrejection', (e) => {
      if (isWinitControlFlow(e.reason)) e.preventDefault();
    });

    // Focus canvas immediately so Bevy receives keyboard events
    canvas.focus();

    // Start boot sequence
    boot();
  </script>
</body>
</html>
