<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Firewolf</title>
  <link rel="icon" href="data:," />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #e4e4e7;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    #canvas-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
    canvas#firewolf-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    canvas#firewolf-canvas.locked {
      cursor: none;
    }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      pointer-events: auto;
      transition: opacity 0.3s;
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #overlay h1 {
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #f59e0b;
      margin-bottom: 12px;
    }
    #overlay p {
      font-size: 13px;
      color: #a1a1aa;
      line-height: 1.6;
      text-align: center;
      max-width: 400px;
    }
    #overlay .click-prompt {
      margin-top: 24px;
      font-size: 16px;
      color: #fafafa;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    #overlay pre {
      font-size: 11px;
      color: #fca5a5;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 4px;
      padding: 12px;
      margin-top: 12px;
      overflow: auto;
      max-height: 200px;
      max-width: 560px;
    }

    /* ── Loading progress bar ─────────────────────────────────────────── */
    #load-progress-container {
      width: 320px;
      margin-top: 20px;
      display: none; /* shown by JS when asset loading starts */
    }
    #load-progress-label {
      font-size: 11px;
      color: #71717a;
      text-align: center;
      margin-bottom: 6px;
      font-family: monospace;
    }
    #load-progress-bar-bg {
      width: 100%;
      height: 6px;
      background: #27272a;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid #3f3f46;
    }
    #load-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f59e0b, #ef4444);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    #build-info {
      position: fixed;
      bottom: 16px;
      left: 16px;
      font-size: 18px;
      font-weight: bold;
      color: #e4e4e7;
      text-shadow: 0 0 4px #000, 0 0 8px #000;
      z-index: 50;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="canvas-wrapper">
    <canvas id="firewolf-canvas" tabindex="0"></canvas>
  </div>

  <div id="overlay">
    <h1 id="overlay-title">Loading</h1>
    <p id="overlay-msg">Fetching ~44 MB wasm bundle. First load is slow; subsequent visits are cached.</p>
    <div id="load-progress-container">
      <div id="load-progress-label">Loading weapons...</div>
      <div id="load-progress-bar-bg">
        <div id="load-progress-bar"></div>
      </div>
    </div>
  </div>

  <div id="build-info"></div>

  <script type="module">
    const canvas = document.getElementById('firewolf-canvas');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg = document.getElementById('overlay-msg');
    const buildInfoEl = document.getElementById('build-info');
    const progressContainer = document.getElementById('load-progress-container');
    const progressLabel = document.getElementById('load-progress-label');
    const progressBar = document.getElementById('load-progress-bar');

    // ── Resize canvas to fill viewport ──────────────────────────────────────
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Pointer lock management ─────────────────────────────────────────────
    let gameReady = false;
    let pointerLocked = false;

    function requestLock() {
      if (!pointerLocked && gameReady) {
        canvas.requestPointerLock().catch(() => {});
      }
    }

    document.addEventListener('pointerlockchange', () => {
      pointerLocked = (document.pointerLockElement === canvas);
      if (pointerLocked) {
        canvas.classList.add('locked');
        overlay.classList.add('hidden');
      } else {
        canvas.classList.remove('locked');
        // Show a "click to resume" prompt when pointer lock is lost
        overlayTitle.textContent = 'Paused';
        overlayMsg.innerHTML = '<span class="click-prompt">Click to resume</span>';
        progressContainer.style.display = 'none';
        overlay.classList.remove('hidden');
      }
    });

    // Click anywhere to (re-)acquire pointer lock
    canvas.addEventListener('click', requestLock);
    overlay.addEventListener('click', () => {
      // Block clicks until assets are loaded and game is ready
      if (!gameReady) return;
      overlay.classList.add('hidden');
      // Small delay to let overlay hide before requesting lock
      setTimeout(requestLock, 50);
    });

    // ── Build info ──────────────────────────────────────────────────────────
    void fetch('./build-info.txt', { cache: 'no-cache' })
      .then(r => r.ok ? r.text() : null)
      .then(t => {
        if (!t) return;
        const map = Object.fromEntries(
          t.trim().split('\n').map(l => {
            const i = l.indexOf('=');
            return i < 0 ? [l, ''] : [l.slice(0, i), l.slice(i + 1)];
          })
        );
        if (map.commit) {
          buildInfoEl.textContent =
            `Bevy 0.14 · ${map.commit.slice(0, 8)} · built ${map.built_at ?? '?'}`;
        }
      })
      .catch(() => {});

    // ── Asset preload progress polling ──────────────────────────────────────
    let assetsReady = false;
    let progressPollInterval = null;

    function startProgressPolling() {
      progressContainer.style.display = 'block';
      overlayTitle.textContent = 'Loading Assets';
      overlayMsg.textContent = 'Downloading weapon models (~109 MB). Cached after first load.';

      progressPollInterval = setInterval(() => {
        const el = document.getElementById('fw-load-progress');
        if (!el) return;

        const text = el.textContent || '';
        const parts = text.split('/');
        if (parts.length === 2) {
          const loaded = parseInt(parts[0], 10);
          const total = parseInt(parts[1], 10);
          if (!isNaN(loaded) && !isNaN(total) && total > 0) {
            const pct = Math.round((loaded / total) * 100);
            progressBar.style.width = pct + '%';
            progressLabel.textContent = `Loading weapons: ${loaded}/${total} (${pct}%)`;

            if (loaded >= total && !assetsReady) {
              assetsReady = true;
              clearInterval(progressPollInterval);
              // All assets loaded — show "Click to play"
              showReady();
            }
          }
        }
      }, 200);

      // Fallback: if after 60s assets haven't reported done, show ready anyway
      setTimeout(() => {
        if (!assetsReady) {
          assetsReady = true;
          clearInterval(progressPollInterval);
          showReady();
        }
      }, 60000);
    }

    function showReady() {
      gameReady = true;
      overlayTitle.textContent = 'Ready';
      overlayMsg.innerHTML = '<span class="click-prompt">Click to play</span><br><br><small style="color:#71717a">WASD move · Mouse look · Space jump · Q cycle weapon · 1-8 select weapon · RMB scope · Esc pause</small>';
      progressContainer.style.display = 'none';
    }

    // ── Winit control-flow exception suppression ────────────────────────────
    function isWinitControlFlow(err) {
      const s = String(err && (err.message || err));
      return s.includes('Using exceptions for control flow');
    }

    // ── Boot wasm ───────────────────────────────────────────────────────────
    try {
      overlayTitle.textContent = 'Loading';
      overlayMsg.textContent = 'Fetching ~44 MB wasm bundle…';

      const cb = Date.now();
      const mod = await import(`./firewolf_client.js?v=${cb}`);

      overlayTitle.textContent = 'Initializing';
      overlayMsg.textContent = 'Mounting renderer on canvas…';

      const initPromise = mod.default(`./firewolf_client_bg.wasm?v=${cb}`);

      // Give Bevy time to mount and start preloading, then begin polling
      setTimeout(() => {
        startProgressPolling();
      }, 1000);

      await initPromise;
      // If initPromise resolves normally (unlikely with winit), mark ready
      if (!assetsReady) {
        // Wait a bit more for asset progress to complete
        setTimeout(() => {
          if (!assetsReady) {
            assetsReady = true;
            clearInterval(progressPollInterval);
            showReady();
          }
        }, 2000);
      }
    } catch (err) {
      if (isWinitControlFlow(err)) {
        // Bevy is running — start polling for asset progress
        if (!progressPollInterval) {
          startProgressPolling();
        }
      } else {
        console.error(err);
        overlayTitle.textContent = 'Error';
        overlayMsg.textContent = 'Could not start the game.';
        progressContainer.style.display = 'none';
        const pre = document.createElement('pre');
        pre.textContent = err && err.stack ? err.stack : String(err);
        overlay.appendChild(pre);
      }
    }

    // Suppress unhandledrejection for winit control flow
    window.addEventListener('unhandledrejection', (e) => {
      if (isWinitControlFlow(e.reason)) e.preventDefault();
    });

    // Focus canvas immediately so Bevy receives keyboard events
    canvas.focus();
  </script>
</body>
</html>
